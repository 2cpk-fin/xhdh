name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Test Backend ─────────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./backend
        run: ./mvnw -B verify --file pom.xml

  # ── 2. Build & Push Backend ──────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xhdh-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/xhdh-backend:${{ github.sha }}

  # ── 3. Build & Push Frontend ─────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/uniranking-app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xhdh-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/xhdh-frontend:${{ github.sha }}