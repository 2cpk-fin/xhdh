
services:
  # --- THE CACHE (Redis) ---
  xhdh-redis:
    image: redis:latest
    container_name: xhdh-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s  
      timeout: 3s
      retries: 5
    networks:
      - xhdh-network

  # --- THE APPLICATION (Your Spring Boot App) ---
  xhdh-api:
    build: .
    image: xhdh-backend:latest
    container_name: xhdh-backend
    ports:
      - "8000:8000"
    depends_on:
      xhdh-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400000}
      SERVER_PORT: ${SERVER_PORT:-8000}

      SPRING_DATA_REDIS_HOST: xhdh-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
      SPRING_DATA_REDIS_PASSWORD: ""
    networks:
      - xhdh-network

networks:
  xhdh-network:
    driver: bridge