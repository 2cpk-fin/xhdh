# Application properties for the XHDH backend application
spring.application.name=xhdh
spring.config.import=optional:file:.env[.properties],optional:file:./.env[.properties],optional:file:./backend/.env[.properties]

server.port=8000

# JWT configuration
jwt.secret=${JWT_SECRET}
jwt.expiry=${JWT_EXPIRY}

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=120000

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
#spring.jpa.show-sql=true
spring.jpa.open-in-view=true
# TODO: Learn open-in-view first, and then optimize the DB query, solve N + 1 problem


# Redis configuration
spring.data.redis.host=${SPRING_DATA_REDIS_URL:${SPRING_DATA_REDIS_HOST}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

spring.main.allow-circular-references=false
spring.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.connect-timeout=5s
spring.data.redis.timeout=60s

# OAuth2 Google Configuration
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

callback.url=${OAUTH2_CALLBACK_URL}

# Actuator configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true

# Image handle
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB