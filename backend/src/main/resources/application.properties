# Application properties for the XHDH backend application
spring.application.name=xhdh
spring.config.import=optional:file:.env[.properties],optional:file:./.env[.properties],optional:file:./backend/.env[.properties]

server.port=8000

# JWT configuration
jwt.secret=${JWT_SECRET}
jwt.expiry=${JWT_EXPIRY}

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Redis configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:SPRING_DATA_REDIS_URL}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.main.allow-circular-references=false
spring.data.redis.connect-timeout=5s
spring.data.redis.timeout=5s

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Actuator configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true