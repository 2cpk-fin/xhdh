spring.application.name=xhdh
spring.config.import=optional:file:.env[.properties],optional:file:./.env[.properties],optional:file:./backend/.env[.properties]

server.port=${SERVER_PORT:8000}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/xhdh}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}

jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiry=${JWT_EXPIRY:86400000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.main.allow-circular-references=false
spring.data.redis.connect-timeout=5s
spring.data.redis.timeout=5s

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile