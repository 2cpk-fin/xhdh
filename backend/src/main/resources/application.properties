spring.application.name=xhdh
server.port=8000

# Database (These are already correct)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JWT (These are already correct)
jwt.secret = ${JWT_SECRET}
jwt.expiry = ${JWT_EXPIRY}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# --- EDIT THESE REDIS LINES ---
# Use the variable if it exists, otherwise default to xhdh-redis (for local)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:xhdh-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Use the variable for SSL, otherwise default to false (for local)
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

# Password is NEW - Upstash needs this!
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
# ------------------------------

spring.main.allow-circular-references=false
spring.data.redis.connect-timeout=5s
spring.data.redis.timeout=5s

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile