services:

  # ── Backend (Spring Boot) ──────────────────────────────────────────
  backend:
    build:
      image: 2cpk/xhdh-backend:latest
    container_name: xhdh-backend
    env_file: .env
    expose:
      - "8000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Database
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      # Redis
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - SPRING_DATA_REDIS_SSL_ENABLED=${SPRING_DATA_REDIS_SSL_ENABLED}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_DATA_REDIS_PASSWORD}
      # Server
      - SERVER_PORT=8000
      # Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH2_CALLBACK_URL=${OAUTH2_CALLBACK_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    restart: unless-stopped
    networks:
      - xhdh-network

  # ── Frontend (React + Vite → Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend/uniranking-app
      dockerfile: Dockerfile
    container_name: xhdh-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - xhdh-network

networks:
  xhdh-network:
    driver: bridge